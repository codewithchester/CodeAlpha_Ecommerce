{% load static %}
<!doctype html>
<html>
  <head>
    <title>Sign Up - My Store</title>
    <link rel="stylesheet" href="{% static 'store/css/style.css' %}" />
    <style>
      .auth-container {
        max-width: 450px;
        margin: 50px auto;
        padding: 0 20px;
      }

      .auth-box {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .auth-box h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 30px;
        font-size: 1.8em;
      }

      .auth-box form p {
        margin-bottom: 20px;
      }

      .auth-box label {
        display: block;
        margin-bottom: 5px;
        color: #2c3e50;
        font-weight: 500;
      }

      .auth-box input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1em;
        transition: border-color 0.3s;
      }

      .auth-box input:focus {
        outline: none;
        border-color: #667eea;
      }

      .auth-box .helptext {
        font-size: 0.85em;
        color: #7f8c8d;
        display: block;
        margin-top: 5px;
      }

      .auth-box button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.3s;
      }

      .auth-box button:hover {
        transform: translateY(-2px);
      }

      .auth-link {
        text-align: center;
        margin-top: 20px;
        color: #7f8c8d;
      }

      .auth-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }

      .auth-link a:hover {
        text-decoration: underline;
      }

      .errorlist {
        color: #e74c3c;
        list-style: none;
        padding: 0;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="{% url 'product_list' %}" class="logo">🛍️ MyStore</a>
        <div class="nav-links">
          <a href="{% url 'product_list' %}">Home</a>
          <a href="{% url 'cart_summary' %}" class="cart-icon">🛒 Cart</a>
        </div>
      </div>
    </nav>

    <div class="auth-container">
      <div class="auth-box">
        <h2>✨ Create Account</h2>

        <form method="POST">
          {% csrf_token %} {{ form.as_p }}
          <button type="submit">Sign Up</button>
        </form>

        <p class="auth-link">
          Already have an account?
          <a href="{% url 'login' %}">Log In</a>
        </p>
      </div>
    </div>
  </body>
</html>
